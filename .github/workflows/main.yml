name: FX Price Monitor

on:
  schedule:
    - cron: '*/5 * * * *' # 5分おきに実行
  workflow_dispatch: # 手動で今すぐ動かすためのボタン

jobs:
  build:
    runs-on: ubuntu-latest
    # GitHub Actionsがリポジトリのファイルを書き換える許可を与える（config.json更新用）
    permissions:
      contents: write

    steps:
      # 最新のチェックアウトアクション(v4)を使用
      - uses: actions/checkout@v4

      # 最新のPythonセットアップアクション(v5)を使用
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # 必要なライブラリのインストール
      - name: Install dependencies
        run: |
          pip install yfinance requests pandas

      # 監視プログラムの実行
      - name: Run Monitor
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          GAS_WEBAPP_URL: ${{ secrets.GAS_WEBAPP_URL }}
        run: python monitor.py
